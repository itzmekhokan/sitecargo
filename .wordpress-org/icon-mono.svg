<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Crate">
  <title>Crate (monochrome)</title>
  <!-- Single-color variant for favicons, docs, dark/light UI. Recolor via `fill`. -->
  <g fill="#2847D9">
    <!-- Promotion arrow -->
    <polygon points="128,22 166,64 142,64 142,96 114,96 114,64 90,64"/>
  </g>
  <g fill="none" stroke="#2847D9" stroke-width="9" stroke-linejoin="round" stroke-linecap="round">
    <!-- Isometric crate outline -->
    <polygon points="128,92 184,124 128,156 72,124"/>
    <polygon points="72,124 128,156 128,214 72,182"/>
    <polygon points="184,124 128,156 128,214 184,182"/>
  </g>
</svg>
